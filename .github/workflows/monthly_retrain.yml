name: Re-entrenamiento mensual de modelos

on:
  schedule:
    # Primer día de cada mes a las 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:   # permite lanzarlo manualmente

jobs:
  retrain:
    name: Train + Save Models
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Entrenar y guardar modelos
        run: python src/pipeline/06_train_and_save_models.py
        # Los modelos se guardan en models/*.pkl (~30–50 MB cada uno).
        # GitHub LFS debe estar configurado si los ficheros superan los 100 MB.

      - name: Actualizar predicciones con los modelos nuevos
        run: python src/pipeline/05_update_predictions.py

      - name: Confirmar y publicar modelos + predicciones
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ app/data/predictions.json
          git diff --cached --quiet && echo "Sin cambios." || \
            git commit -m "chore: re-entrenamiento mensual $(date -u +%Y-%m)"
          git push
